<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>batabicmschool</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
.container { margin-top: 50px; }
input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}
button { background: #22c55e; color: white; cursor: pointer; }
.hidden { display: none; }
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin: 10px auto;
    width: 300px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎓 batabicmschool</h1>

<!-- تسجيل -->
<div id="auth" class="card">
    <h3>تسجيل / دخول</h3>
    <input type="email" id="email" placeholder="الإيميل">
    <br>
    <input type="password" id="password" placeholder="كلمة المرور">
    <br>
    <button onclick="signup()">إنشاء حساب</button>
    <button onclick="login()">دخول</button>
</div>

<!-- الطالب -->
<div id="student" class="card hidden">
    <h3>لوحة الطالب</h3>
    <div id="classArea" class="hidden">
        <p id="className"></p>
        <a id="zoomLink" target="_blank">
            <button>الدخول إلى الزوم</button>
        </a>
    </div>
</div>

<!-- المعلم -->
<div id="teacher" class="card hidden">
    <h3>لوحة المعلم</h3>
    <input type="text" id="classInput" placeholder="اسم الحصة">
    <br>
    <input type="text" id="zoomInput" placeholder="رابط Zoom">
    <br>
    <button onclick="startClass()">بدء الحصة</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 ضع بيانات Firebase
var firebaseConfig = {
  apiKey: "PUT-YOUR-KEY",
  authDomain: "PUT-YOUR-DOMAIN",
  databaseURL: "PUT-YOUR-URL"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.database();

// المعلمين (إيميلاتهم)
const teachers = [
"teacher@app.com",
"school@app.com"
];

// إنشاء حساب
function signup() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("✅ تم إنشاء الحساب"))
    .catch(e => alert(e.message));
}

// تسجيل دخول
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .catch(e => alert(e.message));
}

// عند تسجيل الدخول
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("auth").classList.add("hidden");

        if (teachers.includes(user.email)) {
            document.getElementById("teacher").classList.remove("hidden");
        } else {
            document.getElementById("student").classList.remove("hidden");
        }
    }
});

// بدء الحصة
function startClass() {

    let now = new Date();
    let makkahTime = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" })
    );

    let day = makkahTime.getDay();
    let hours = makkahTime.getHours();
    let minutes = makkahTime.getMinutes();

    if (day === 6 && hours === 22 && minutes >= 45) {

        let name = document.getElementById("classInput").value;
        let link = document.getElementById("zoomInput").value;

        db.ref("class").set({ name, link });

        alert("✅ تم بدء الحصة!");
    } else {
        alert("❌ فقط السبت 10:45 مساءً");
    }
}

// عرض الحصة للطلاب
db.ref("class").on("value", snap => {
    let data = snap.val();
    if (data) {
        document.getElementById("classArea").classList.remove("hidden");
        document.getElementById("className").innerText = "📚 " + data.name;
        document.getElementById("zoomLink").href = data.link;
    }
});

</script>

</body>
</html>
