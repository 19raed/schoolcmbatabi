<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>batabicmschool</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
.container { margin-top: 50px; }
input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}
button { background: #22c55e; color: white; cursor: pointer; }
.hidden { display: none; }
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin: 10px auto;
    width: 300px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎓 batabicmschool</h1>
<p>课程时间：周六 晚上10:45（麦加时间）</p>

<!-- 认证 -->
<div id="auth" class="card">
    <h3>注册 / 登录</h3>
    <input type="email" id="email" placeholder="邮箱">
    <br>
    <input type="password" id="password" placeholder="密码">
    <br>
    <button onclick="signup()">注册</button>
    <button onclick="login()">登录</button>
</div>

<!-- 学生 -->
<div id="student" class="card hidden">
    <h3>学生面板</h3>

    <div id="classArea" class="hidden">
        <p id="className"></p>
        <a id="zoomLink" target="_blank">
            <button>进入 Zoom</button>
        </a>
    </div>
</div>

<!-- 老师 -->
<div id="teacher" class="card hidden">
    <h3>老师面板</h3>

    <input type="text" id="classInput" placeholder="课程名称">
    <br>
    <input type="text" id="zoomInput" placeholder="Zoom 链接">
    <br>

    <button onclick="startClass()">开始课程</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 填入你的 Firebase 配置
var firebaseConfig = {
  apiKey: "PUT-YOUR-KEY",
  authDomain: "PUT-YOUR-DOMAIN",
  databaseURL: "PUT-YOUR-URL"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.database();

// 老师邮箱
const teachers = [
"teacher@app.com",
"school@app.com"
];

// 注册
function signup() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("注册成功"))
    .catch(e => alert(e.message));
}

// 登录
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .catch(e => alert(e.message));
}

// 登录状态
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("auth").classList.add("hidden");

        if (teachers.includes(user.email)) {
            document.getElementById("teacher").classList.remove("hidden");
        } else {
            document.getElementById("student").classList.remove("hidden");
        }
    }
});

// 开始课程（限制时间）
function startClass() {

    let now = new Date();

    let makkahTime = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" })
    );

    let day = makkahTime.getDay(); // 周六 = 6
    let hours = makkahTime.getHours();
    let minutes = makkahTime.getMinutes();

    if (day === 6 && hours === 22 && minutes >= 45) {

        let name = document.getElementById("classInput").value;
        let link = document.getElementById("zoomInput").value;

        db.ref("class").set({ name, link });

        alert("课程已开始！");
    }

    else {
        alert("只能在周六晚上10:45（麦加时间）开始课程");
    }
}

// 学生实时查看课程
db.ref("class").on("value", snap => {
    let data = snap.val();
    if (data) {
        document.getElementById("classArea").classList.remove("hidden");
        document.getElementById("className").innerText = "📚 " + data.name;
        document.getElementById("zoomLink").href = data.link;
    }
});

</script>

</body>
</html>
