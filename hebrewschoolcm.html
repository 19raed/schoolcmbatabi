<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>batabicmschool</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
.container { margin-top: 50px; }
input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}
button { background: #22c55e; color: white; cursor: pointer; }
.hidden { display: none; }
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin: 10px auto;
    width: 300px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎓 batabicmschool</h1>
<p>השיעורים מתחילים בשבת בשעה 22:45 (שעון מכה)</p>

<!-- AUTH -->
<div id="auth" class="card">
    <h3>הרשמה / התחברות</h3>
    <input type="email" id="email" placeholder="אימייל">
    <br>
    <input type="password" id="password" placeholder="סיסמה">
    <br>
    <button onclick="signup()">הרשמה</button>
    <button onclick="login()">התחברות</button>
</div>

<!-- STUDENT -->
<div id="student" class="card hidden">
    <h3>לוח תלמיד</h3>

    <div id="classArea" class="hidden">
        <p id="className"></p>
        <a id="zoomLink" target="_blank">
            <button>הצטרף ל-Zoom</button>
        </a>
    </div>
</div>

<!-- TEACHER -->
<div id="teacher" class="card hidden">
    <h3>לוח מורה</h3>

    <input type="text" id="classInput" placeholder="שם השיעור">
    <br>
    <input type="text" id="zoomInput" placeholder="קישור Zoom">
    <br>

    <button onclick="startClass()">התחל שיעור</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 הכנס כאן את Firebase שלך
var firebaseConfig = {
  apiKey: "PUT-YOUR-KEY",
  authDomain: "PUT-YOUR-DOMAIN",
  databaseURL: "PUT-YOUR-URL"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.database();

// מורים
const teachers = [
"teacher@app.com",
"school@app.com"
];

// הרשמה
function signup() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("החשבון נוצר בהצלחה"))
    .catch(e => alert(e.message));
}

// התחברות
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .catch(e => alert(e.message));
}

// מצב התחברות
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("auth").classList.add("hidden");

        if (teachers.includes(user.email)) {
            document.getElementById("teacher").classList.remove("hidden");
        } else {
            document.getElementById("student").classList.remove("hidden");
        }
    }
});

// התחלת שיעור (הגבלת זמן)
function startClass() {

    let now = new Date();

    let makkahTime = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" })
    );

    let day = makkahTime.getDay(); // שבת = 6
    let hours = makkahTime.getHours();
    let minutes = makkahTime.getMinutes();

    if (day === 6 && hours === 22 && minutes >= 45) {

        let name = document.getElementById("classInput").value;
        let link = document.getElementById("zoomInput").value;

        db.ref("class").set({ name, link });

        alert("השיעור התחיל!");
    }

    else {
        alert("ניתן להתחיל שיעור רק בשבת 22:45 (שעון מכה)");
    }
}

// הצגת שיעור לתלמידים
db.ref("class").on("value", snap => {
    let data = snap.val();
    if (data) {
        document.getElementById("classArea").classList.remove("hidden");
        document.getElementById("className").innerText = "📚 " + data.name;
        document.getElementById("zoomLink").href = data.link;
    }
});

</script>

</body>
</html>
