<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>batabicmschool</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
.container { margin-top: 50px; }
input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}
button { background: #22c55e; color: white; cursor: pointer; }
.hidden { display: none; }
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin: 10px auto;
    width: 300px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎓 batabicmschool</h1>
<p>Classes start Saturday at 10:45 PM (Makkah time)</p>

<!-- AUTH -->
<div id="auth" class="card">
    <h3>Sign Up / Login</h3>
    <input type="email" id="email" placeholder="Email">
    <br>
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
</div>

<!-- STUDENT -->
<div id="student" class="card hidden">
    <h3>Student Panel</h3>

    <div id="classArea" class="hidden">
        <p id="className"></p>
        <a id="zoomLink" target="_blank">
            <button>Join Zoom</button>
        </a>
    </div>
</div>

<!-- TEACHER -->
<div id="teacher" class="card hidden">
    <h3>Teacher Panel</h3>

    <input type="text" id="classInput" placeholder="Class Name">
    <br>
    <input type="text" id="zoomInput" placeholder="Zoom Link">
    <br>

    <button onclick="startClass()">Start Class</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 PUT YOUR FIREBASE CONFIG HERE
var firebaseConfig = {
  apiKey: "PUT-YOUR-KEY",
  authDomain: "PUT-YOUR-DOMAIN",
  databaseURL: "PUT-YOUR-URL"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.database();

// Teacher emails
const teachers = [
"teacher@app.com",
"school@app.com"
];

// SIGN UP
function signup() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Account created successfully"))
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .catch(e => alert(e.message));
}

// Detect login
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("auth").classList.add("hidden");

        if (teachers.includes(user.email)) {
            document.getElementById("teacher").classList.remove("hidden");
        } else {
            document.getElementById("student").classList.remove("hidden");
        }
    }
});

// START CLASS (Makkah time restriction)
function startClass() {

    let now = new Date();

    let makkahTime = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" })
    );

    let day = makkahTime.getDay(); // Saturday = 6
    let hours = makkahTime.getHours();
    let minutes = makkahTime.getMinutes();

    if (day === 6 && hours === 22 && minutes >= 45) {

        let name = document.getElementById("classInput").value;
        let link = document.getElementById("zoomInput").value;

        db.ref("class").set({ name, link });

        alert("Class started successfully!");
    }

    else {
        alert("You can only start class on Saturday at 10:45 PM (Makkah)");
    }
}

// SHOW CLASS TO STUDENTS (REAL-TIME)
db.ref("class").on("value", snap => {
    let data = snap.val();
    if (data) {
        document.getElementById("classArea").classList.remove("hidden");
        document.getElementById("className").innerText = "📚 " + data.name;
        document.getElementById("zoomLink").href = data.link;
    }
});

</script>

</body>
</html>
